name: GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    name: Build WebGL demos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten 3.1.64
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.64"
          actions-cache-folder: .emsdk-cache

      - name: Create site directory
        run: mkdir -p site

      - name: Build Chapter2/2-OpenGLES3_Primitives-Modern
        continue-on-error: true
        working-directory: Chapter2/2-OpenGLES3_Primitives-Modern
        run: |
          sed 's/-s USE_WEBGL2=1 \\/-s USE_WEBGL2=1 \\\n    -s MIN_WEBGL_VERSION=2 \\\n    -s MAX_WEBGL_VERSION=2 \\/' build_web.sh | bash
          mkdir -p ../../site/Chapter2/2-OpenGLES3_Primitives-Modern
          cp -r web/. ../../site/Chapter2/2-OpenGLES3_Primitives-Modern/

      - name: Copy Assignment 1 WebGL output
        run: |
          mkdir -p site/Assignment1/AndroidProgrammingQuiz-CrossPlatformCI
          cp -r Assignment1/AndroidProgrammingQuiz-CrossPlatformCI/. site/Assignment1/AndroidProgrammingQuiz-CrossPlatformCI/

      - name: Copy Fixed Assignment 1 WebGL output
        run: |
          mkdir -p site/Assignment1Fixed/AndroidProgrammingQuiz-CrossPlatformCI
          cp -r Assignment1Fixed/AndroidProgrammingQuiz-CrossPlatformCI/. site/Assignment1Fixed/AndroidProgrammingQuiz-CrossPlatformCI/

      - name: Copy Working Assignment 1 WebGL output
        run: |
          mkdir -p site/Assignment1Working/AndroidProgrammingQuiz-CrossPlatformCI
          cp -r Assignment1Working/AndroidProgrammingQuiz-CrossPlatformCI/. site/Assignment1Working/AndroidProgrammingQuiz-CrossPlatformCI/

      - name: Generate index.html
        run: |
          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>OpenGL ES 3.0 Modern — WebGL Demo</title>
          </head>
          <body>
            <h1>OpenGL ES 3.0 Modern</h1>
            <p>An interactive WebGL demo that runs directly in your browser. No installation needed.</p>

            <h2>Chapter 2 — Primitives</h2>
            <p>OpenGL primitives: point, line, and triangle with their variations.</p>
            <p><a href="Chapter2/2-OpenGLES3_Primitives-Modern/">Launch Chapter 2 demo</a></p>

            <h2>Assignment 1 — Android Programming Quiz</h2>
            <p>Completed WebGL/Emscripten output for my assignment.</p>
            <p><a href="Assignment1/AndroidProgrammingQuiz-CrossPlatformCI/">Launch Assignment 1 demo</a></p>

            <h2>Assignment 1 Fixed — Android Programming Quiz</h2>
            <p>Fixed WebGL/Emscripten output for my assignment.</p>
            <p><a href="Assignment1Fixed/AndroidProgrammingQuiz-CrossPlatformCI/">Launch fixed Assignment 1 demo</a></p>

            <h2>Assignment 1 Working — Android Programming Quiz</h2>
            <p>Verified local WebGL/Emscripten output for my assignment.</p>
            <p><a href="Assignment1Working/AndroidProgrammingQuiz-CrossPlatformCI/">Launch working Assignment 1 demo</a></p>
          </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5